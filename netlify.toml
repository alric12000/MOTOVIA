# Netlify Configuration File
# Learn more at https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # Command to build the project
  command = "npm run build"
  
  # Directory containing the built static assets
  publish = "dist"

# Redirect rule to handle React Router client-side routing.
# This redirects all traffic to index.html so React Router can load the correct route.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
